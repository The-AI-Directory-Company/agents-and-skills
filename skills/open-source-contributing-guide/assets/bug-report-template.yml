name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "needs triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Fill out the sections below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear, concise description of what the bug is.
      placeholder: "When I do X, I expect Y to happen, but Z happens instead."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Numbered steps to reproduce the behavior. Be specific.
      placeholder: |
        1. Install version X.Y.Z
        2. Run `command --flag value`
        3. Observe the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages, stack traces, or screenshots.
    validations:
      required: true

  - type: textarea
    id: minimal-reproduction
    attributes:
      label: Minimal Reproduction
      description: |
        A minimal code snippet, config, or repository link that reproduces the issue.
        If you can provide a failing test case, even better.
      placeholder: |
        ```python
        # Minimal code that triggers the bug
        ```
      render: shell
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is the impact?
      options:
        - "Critical: Data loss, crash, security issue"
        - "Major: Feature broken, no workaround"
        - "Minor: Feature broken, workaround exists"
        - "Cosmetic: Visual or text issue"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: "Which version are you using? Run `command --version` to check."
      placeholder: "e.g., 1.2.3"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Fedora/RHEL)
        - Linux (Arch)
        - Linux (Other)
        - Windows 10
        - Windows 11
        - Other
    validations:
      required: true

  - type: input
    id: runtime-version
    attributes:
      label: Runtime Version
      description: "Language/runtime version (e.g., Python 3.12.1, Node 20.11.0)"
      placeholder: "e.g., Python 3.12.1"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Additional Environment Details
      description: "Any other relevant environment info: Docker, CI, package manager version, etc."
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Paste any relevant log output. This will be formatted as code automatically.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Before Submitting
      options:
        - label: I searched existing issues and this bug has not been reported
          required: true
        - label: I am using the latest version (or checked that the bug exists in the latest version)
          required: true
        - label: I included steps to reproduce the issue
          required: true
