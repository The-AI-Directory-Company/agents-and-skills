# =============================================================================
# GitHub Actions CI/CD Pipeline
# =============================================================================
# Stages: Lint -> Test (matrix) -> Build -> Deploy Staging -> Smoke Test -> Deploy Prod
#
# Trigger rules:
#   - PRs to main:  lint + test + build (no deploy)
#   - Push to main:  lint + test + build + deploy staging + smoke test
#   - Version tags:  lint + test + build + deploy staging + smoke test + deploy prod
#   - Manual:        workflow_dispatch with environment selector
# =============================================================================

name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------

jobs:

  # -------------------------------------------------------------------------
  # Lint — runs on every trigger
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Run Prettier check
        run: pnpm format:check

  # -------------------------------------------------------------------------
  # Test — matrix strategy for parallel shards
  # -------------------------------------------------------------------------
  test:
    name: Test (shard ${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test -- --shard=${{ matrix.shard }}/${{ strategy.job-total }}
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

  # -------------------------------------------------------------------------
  # Build — depends on lint + test passing
  # -------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            apps/web/.next/
            apps/web/public/
            !apps/web/.next/cache/
          retention-days: 7

  # -------------------------------------------------------------------------
  # Deploy to staging — only on push to main or tag
  # -------------------------------------------------------------------------
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    environment:
      name: staging
      url: https://staging.example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: apps/web/

      - name: Deploy to staging
        run: |
          # Replace with your deploy command:
          # npx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
          # aws s3 sync ./apps/web/.next s3://staging-bucket/
          # kubectl apply -f k8s/staging/
          echo "Deploying build artifact to staging..."
        env:
          DEPLOY_TOKEN: ${{ secrets.STAGING_DEPLOY_TOKEN }}

  # -------------------------------------------------------------------------
  # Smoke test — validates staging deployment
  # -------------------------------------------------------------------------
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [deploy-staging]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://staging.example.com/api/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Health check returned $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Critical path test
        run: |
          # Verify critical pages return 200
          URLS=(
            "https://staging.example.com/"
            "https://staging.example.com/login"
            "https://staging.example.com/api/health"
          )
          for URL in "${URLS[@]}"; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$URL")
            if [ "$STATUS" != "200" ]; then
              echo "FAIL: $URL returned $STATUS"
              exit 1
            fi
            echo "OK: $URL"
          done

  # -------------------------------------------------------------------------
  # Deploy to production — requires tag OR manual trigger + approval
  # -------------------------------------------------------------------------
  deploy-prod:
    name: Deploy Production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [smoke-test]
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')

    environment:
      name: production
      url: https://app.example.com
      # Configure required reviewers in GitHub repo settings:
      # Settings > Environments > production > Required reviewers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: apps/web/

      - name: Deploy to production
        run: |
          echo "Deploying build artifact to production..."
          # Same artifact that passed staging smoke tests
          # npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          DEPLOY_TOKEN: ${{ secrets.PROD_DEPLOY_TOKEN }}

      - name: Post-deploy verification
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://app.example.com/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "CRITICAL: Production health check failed with status $STATUS"
            exit 1
          fi
          echo "Production deploy verified."
