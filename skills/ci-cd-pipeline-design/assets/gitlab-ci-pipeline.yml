# =============================================================================
# GitLab CI/CD Pipeline
# =============================================================================
# Stages: lint -> test -> build -> deploy-staging -> smoke-test -> deploy-prod
#
# Trigger rules:
#   - Merge requests:  lint + test + build (no deploy)
#   - Push to main:    lint + test + build + deploy staging + smoke test
#   - Tags (v*):       Full pipeline including production deploy
#   - Manual:          deploy-prod can be triggered manually from any pipeline
# =============================================================================

stages:
  - lint
  - test
  - build
  - deploy-staging
  - smoke-test
  - deploy-prod

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------

default:
  image: node:20-slim
  before_script:
    - corepack enable
    - corepack prepare pnpm@9 --activate
    - pnpm install --frozen-lockfile

# Cache dependencies across all jobs
cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - node_modules/
    - .pnpm-store/
  policy: pull

variables:
  PNPM_STORE_DIR: .pnpm-store
  FF_USE_FASTZIP: "true"

# ---------------------------------------------------------------------------
# Lint stage
# ---------------------------------------------------------------------------

lint:
  stage: lint
  timeout: 5 minutes
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - pnpm lint
    - pnpm format:check

# ---------------------------------------------------------------------------
# Test stage — parallel shards
# ---------------------------------------------------------------------------

.test-template: &test-template
  stage: test
  timeout: 15 minutes
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v/
  variables:
    DATABASE_URL: $TEST_DATABASE_URL
  artifacts:
    when: always
    reports:
      junit: junit-report.xml
    expire_in: 7 days

test:1/4:
  <<: *test-template
  script:
    - pnpm test -- --shard=1/4 --reporter=junit --outputFile=junit-report.xml

test:2/4:
  <<: *test-template
  script:
    - pnpm test -- --shard=2/4 --reporter=junit --outputFile=junit-report.xml

test:3/4:
  <<: *test-template
  script:
    - pnpm test -- --shard=3/4 --reporter=junit --outputFile=junit-report.xml

test:4/4:
  <<: *test-template
  script:
    - pnpm test -- --shard=4/4 --reporter=junit --outputFile=junit-report.xml

# ---------------------------------------------------------------------------
# Build stage
# ---------------------------------------------------------------------------

build:
  stage: build
  timeout: 10 minutes
  needs:
    - lint
    - test:1/4
    - test:2/4
    - test:3/4
    - test:4/4
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - pnpm build
  artifacts:
    paths:
      - apps/web/.next/
      - apps/web/public/
    exclude:
      - apps/web/.next/cache/**
    expire_in: 7 days

# ---------------------------------------------------------------------------
# Deploy to staging
# ---------------------------------------------------------------------------

deploy-staging:
  stage: deploy-staging
  timeout: 10 minutes
  needs:
    - build
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v/
  environment:
    name: staging
    url: https://staging.example.com
  script:
    - echo "Deploying build artifact to staging..."
    # Replace with your deploy command:
    # npx vercel deploy --prebuilt --token=$VERCEL_TOKEN
    # aws s3 sync ./apps/web/.next s3://staging-bucket/

# ---------------------------------------------------------------------------
# Smoke test
# ---------------------------------------------------------------------------

smoke-test:
  stage: smoke-test
  timeout: 5 minutes
  image: curlimages/curl:latest
  needs:
    - deploy-staging
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v/
  before_script: []  # Override global before_script — no Node.js needed
  script:
    - |
      for i in 1 2 3 4 5; do
        STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://staging.example.com/api/health)
        if [ "$STATUS" = "200" ]; then
          echo "Health check passed (attempt $i)"
          exit 0
        fi
        echo "Health check returned $STATUS, retrying in 10s..."
        sleep 10
      done
      echo "Health check failed after 5 attempts"
      exit 1

# ---------------------------------------------------------------------------
# Deploy to production — manual gate
# ---------------------------------------------------------------------------

deploy-prod:
  stage: deploy-prod
  timeout: 10 minutes
  needs:
    - smoke-test
    - build
  rules:
    # Auto-deploy on tags, manual on main branch
    - if: $CI_COMMIT_TAG =~ /^v/
      when: manual
      allow_failure: false
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true
  environment:
    name: production
    url: https://app.example.com
  script:
    - echo "Deploying build artifact to production..."
    # Same artifact that passed staging smoke tests
    # npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
    - |
      sleep 15
      STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://app.example.com/api/health)
      if [ "$STATUS" != "200" ]; then
        echo "CRITICAL: Production health check failed with status $STATUS"
        exit 1
      fi
      echo "Production deploy verified."
