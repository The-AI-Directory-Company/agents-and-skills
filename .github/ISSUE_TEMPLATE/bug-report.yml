name: "Bug Report"
description: "Report a problem with the repository, CI, or website rendering"
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: "Describe the issue clearly"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce
      description: "Steps, URLs, or file paths"
    validations:
      required: false
