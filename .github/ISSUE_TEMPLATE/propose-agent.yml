name: "Propose a New Agent"
description: "Suggest a new agent persona for the directory"
labels: ["new-agent", "triage"]
body:
  - type: input
    id: slug
    attributes:
      label: Agent slug
      description: "Lowercase, hyphenated (e.g., devops-engineer). This becomes the filename."
      placeholder: "my-agent-name"
    validations:
      required: true

  - type: input
    id: display-name
    attributes:
      label: Display name
      description: "Human-readable name (e.g., DevOps Engineer Agent)"
      placeholder: "My Agent Name"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What does this agent do?
      description: "1-3 sentences. What role does it play? When should someone use it?"
      placeholder: "An AI agent that..."
    validations:
      required: true

  - type: dropdown
    id: primary-category
    attributes:
      label: Primary category
      options:
        - engineering
        - product-management
        - project-management
        - design
        - data
        - business
        - communication
        - security
        - leadership
        - operations
    validations:
      required: true

  - type: textarea
    id: related
    attributes:
      label: Related agents or skills
      description: "Any existing agents/skills this would complement? (optional)"
      placeholder: "Works well with: code-reviewer, test-plan-writing"
    validations:
      required: false

  - type: checkboxes
    id: willing-to-submit
    attributes:
      label: Contribution
      options:
        - label: "I am willing to submit a PR for this agent"
          required: false
